<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Dungeon - Visibility Debugger (Logic V2)</title>
    <style>
      :root {
        --cell-size: 30px;
        --bg-color: #1a1a1a;
      }
      body {
        font-family: sans-serif;
        background: var(--bg-color);
        color: white;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
      }
      #controls {
        background: #2c2c2c;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
        width: 800px;
        display: flex;
        gap: 20px;
        align-items: center;
        border: 1px solid #444;
      }
      .grid-container {
        display: grid;
        grid-template-columns: repeat(26, var(--cell-size));
        grid-template-rows: repeat(19, var(--cell-size));
        gap: 1px;
        background: #333;
        border: 5px solid #000;
      }
      .cell {
        width: var(--cell-size);
        height: var(--cell-size);
        background: #444;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        cursor: pointer;
      }
      /* Colorazione secondo la tua logica */
      .cell.active {
        background: #ffeb3b !important;
        color: black;
        font-weight: bold;
      }
      .cell.visible {
        background: #64ffda !important;
        color: black;
      } /* Celle che soddisfano i criteri */

      #panel {
        margin-top: 20px;
        width: 810px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .info-box {
        background: #2c2c2c;
        padding: 15px;
        border-radius: 8px;
        border-left: 5px solid #64ffda;
      }
    </style>
  </head>
  <body>
    <h1>HQ Visibility Explorer (Logica Puntatori)</h1>

    <div id="controls">
      <input type="file" id="fileInput" accept=".json" />
      <div style="font-size: 0.9em">
        Legenda: <span style="color: #ffeb3b">■</span> Eroe |
        <span style="color: #64ffda">■</span> Celle visibili (match su vis1)
      </div>
    </div>

    <div id="grid" class="grid-container"></div>

    <div id="panel">
      <div class="info-box">
        <strong>Cella Corrente:</strong>
        <div id="debug-info">-</div>
      </div>
      <div class="info-box">
        <strong>Regola Attiva:</strong>
        <div id="logic-info">Passa sopra una cella...</div>
      </div>
    </div>

    <script>
      let mapData = null;
      const gridEl = document.getElementById("grid");

      document
        .getElementById("fileInput")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          const reader = new FileReader();
          reader.onload = function (event) {
            const json = JSON.parse(event.target.result);
            mapData = json.data || json.cells;
            renderGrid();
          };
          reader.readAsText(file);
        });

      function renderGrid() {
        gridEl.innerHTML = "";
        mapData.forEach((cell, index) => {
          const div = document.createElement("div");
          div.className = "cell";
          div.innerText = cell.vis1;
          div.onmouseenter = () => updateVisibility(cell, index);
          gridEl.appendChild(div);
        });
      }

      function updateVisibility(currentCell, currentIndex) {
        const allDivs = document.querySelectorAll(".cell");
        allDivs.forEach((d) => d.classList.remove("active", "visible"));

        const targetVis1 = currentCell.vis1;
        const targetVis2 = currentCell.vis2;

        allDivs[currentIndex].classList.add("active");

        // LOGICA RICHIESTA:
        // 1. Vedo tutte le celle che hanno vis1 = al vis1 della mia cella
        // 2. SE la mia cella ha vis2 > 0, vedo anche tutte le celle che hanno vis1 = al vis2 della mia cella

        mapData.forEach((cell, idx) => {
          let shouldBeVisible = false;

          // Condizione 1: match su vis1 corrente
          if (cell.vis1 === targetVis1 && targetVis1 !== "0") {
            shouldBeVisible = true;
          }

          // Condizione 2: match su vis2 corrente (solo se vis2 > 0)
          if (targetVis2 && targetVis2 !== "0" && targetVis2 !== "") {
            if (cell.vis1 === targetVis2) {
              shouldBeVisible = true;
            }
          }

          if (shouldBeVisible) {
            allDivs[idx].classList.add("visible");
          }
        });

        document.getElementById("debug-info").innerHTML = `
            Coord: X:${currentCell.x} Y:${currentCell.y}<br>
            <b>VIS1 Sorgente: ${targetVis1}</b><br>
            <b>VIS2 Sorgente: ${targetVis2}</b>
        `;

        document.getElementById("logic-info").innerHTML = `
            Cerca celle con vis1 == "${targetVis1}"<br>
            ${targetVis2 > 0 ? `E cerca celle con vis1 == "${targetVis2}"` : "<i>Vis2 non attivo</i>"}
        `;
      }
    </script>
  </body>
</html>
